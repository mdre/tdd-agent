// ============================================================
// build.gradle — Gradle 9.3.1 + Java 21 + Maven Central Portal
// ============================================================
import org.gradle.api.publish.maven.tasks.GenerateMavenPom

plugins {
    id 'java-library'
    id 'com.vanniktech.maven.publish' version '0.36.0'
    id 'nu.studer.credentials'        version '3.0'
    id 'idea'
}

// ============================================================
// Java Toolchain
// FIX #1: withJavadocJar() y withSourcesJar() son manejados
// automáticamente por el plugin vanniktech vía configure(JavaLibrary).
// Dejarlos aquí genera duplicados y conflictos con Gradle 9.
// ============================================================
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    // NO withJavadocJar() ni withSourcesJar() — los genera vanniktech
}

idea {
    module {
        downloadJavadoc = true
    }
}

// ============================================================
// Repositorios
// ============================================================
repositories {
    mavenLocal()
    mavenCentral()
}

// ============================================================
// Dependencias
// ============================================================
dependencies {
    implementation 'org.ow2.asm:asm:9.7'
    implementation 'org.ow2.asm:asm-util:9.7'
    implementation 'org.ow2.asm:asm-commons:9.7'
    // Requeridas por AbstractWriteAccessActivatorAdapter: MethodNode/InsnList (asm-tree) y
    // Analyzer/Interpreter/Frame (asm-analysis), usadas para el análisis de dataflow de dos pasadas.
    implementation 'org.ow2.asm:asm-tree:9.7'
    implementation 'org.ow2.asm:asm-analysis:9.7'
    testImplementation 'junit:junit:4.13.2'
    implementation 'org.apache.logging.log4j:log4j-core:2.23.1'
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
}

// ============================================================
// Credenciales
//
// Guardar UNA vez con:
//   gradle addCredentials -PcredentialsKey=mavenCentralUsername    -PcredentialsValue=TOKEN_USER
//   gradle addCredentials -PcredentialsKey=mavenCentralPassword    -PcredentialsValue=TOKEN_PASS
//   gradle addCredentials -PcredentialsKey=signingKeyId            -PcredentialsValue=XXXXXXXX
//   gradle addCredentials -PcredentialsKey=signingPassword         -PcredentialsValue=PASSPHRASE
//   gradle addCredentials -PcredentialsKey=signingSecretKeyRingFile -PcredentialsValue=/home/user/.gnupg/secring.gpg
//
// FIX #2: ext["x"] = y NO es visible para providers.gradleProperty()
// que usa vanniktech internamente. Se necesita project.setProperty().
// ============================================================
def injectCredential = { String key ->
    def value = credentials.forKey(key)
    if (value) {
        project.setProperty(key, value)
    }
}

injectCredential("mavenCentralUsername")
injectCredential("mavenCentralPassword")
injectCredential("signingKeyId")
injectCredential("signingPassword")
injectCredential("signingSecretKeyRingFile")

// Mapear al formato que espera el plugin 'signing' de Gradle core
if (project.hasProperty("signingKeyId")) {
    ext["signing.keyId"]             = project.property("signingKeyId")
}
if (project.hasProperty("signingPassword")) {
    ext["signing.password"]          = project.property("signingPassword")
}
if (project.hasProperty("signingSecretKeyRingFile")) {
    ext["signing.secretKeyRingFile"] = project.property("signingSecretKeyRingFile")
}

// ============================================================
// Auto-incremento del build number
// ============================================================
tasks.register('autoBuildNumber') {
    doFirst {
        File propsFile = file('gradle.properties')
        if (propsFile.exists()) {
            def props = new Properties()
            propsFile.withInputStream { props.load(it) }
            String versionStr = props.getProperty('version')
            if (versionStr) {
                def parts = versionStr.tokenize('.')
                if (parts.size() >= 3) {
                    int buildNum = parts.size() == 4 ? (parts[3].toInteger() + 1) : 1
                    String newVersion = "${parts[0]}.${parts[1]}.${parts[2]}.${buildNum}"
                    props.setProperty('version', newVersion)
                    propsFile.withOutputStream { props.store(it, null) }
                    println "Nueva versión: $newVersion"
                }
            }
        }
    }
}

tasks.register('sabn') {}

def taskNames = gradle.startParameter.taskNames.collect { it.toLowerCase() }
if (!taskNames.any { it.contains("release") || it.contains("sabn") }) {
    tasks.named('build') {
        dependsOn 'autoBuildNumber'
    }
}

// ============================================================
// Manifest del JAR (agente Java)
//
// FIX #3: En Gradle 9, configurations.runtimeClasspath NO se
// puede resolver durante la fase de configuración (fuera de
// doFirst/doLast). El manifest con 'Class-Path' requiere los
// archivos resueltos, por lo que debe moverse a un doFirst.
// ============================================================
tasks.named('jar', Jar) {
    doFirst {
        manifest {
            attributes(
                'Class-Path'            : configurations.runtimeClasspath.collect { it.name }.join(' '),
                'Premain-Class'         : 'net.dirtydetector.agent.TransparentDirtyDetectorAgent',
                'Agent-Class'           : 'net.dirtydetector.agent.TransparentDirtyDetectorAgent',
                'Can-Redefine-Classes'  : true,
                'Can-Retransform-Classes': true
            )
        }
    }
}

// ============================================================
// FIX #4: findAgentPath usa el JAR del propio proyecto
// (este es tdd-agent, así que el agente ES el jar compilado).
// archiveFile es un Provider<RegularFile> — se accede con .get()
// solo en tiempo de ejecución (dentro de doLast).
// ============================================================
tasks.register('findAgentPath') {
    dependsOn 'jar'
    doLast {
        def jarTask = tasks.named('jar', Jar).get()
        project.ext.tddAgentPath = jarTask.archiveFile.get().asFile.absolutePath
        println "Path del agente: ${project.ext.tddAgentPath}"
    }
}

// ============================================================
// Tests
//
// FIX #5: jvmArgs con project.tddAgentPath debe estar dentro
// de doFirst para garantizar que findAgentPath ya lo calculó.
// El jvmArgs estático puede quedar fuera sin problema.
// ============================================================
tasks.named('test') {
    dependsOn 'findAgentPath'
    jvmArgs '-Djdk.attach.allowAttachSelf=true'
    doFirst {
        jvmArgs "-javaagent:${project.ext.tddAgentPath}=net.odbogm.annotations.Entity"
    }
    outputs.upToDateWhen { false }
    testLogging {
        showStandardStreams = true
        events "passed", "skipped", "failed"
    }
}

// ============================================================
// Publicación en el NUEVO Maven Central Portal
//
// COMANDOS:
//   gradle publishToMavenCentral sabn -x test
//   gradle publishAndReleaseToMavenCentral sabn -x test
// ============================================================
mavenPublishing {
    publishToMavenCentral()
    signAllPublications()

    // JavaLibrary genera javadocJar y sourcesJar automáticamente
    configure(new com.vanniktech.maven.publish.JavaLibrary(
            new com.vanniktech.maven.publish.JavadocJar.Javadoc(),
            true
    ))

    pom {
        name = project.name
        description = 'Transparent Dirty Detector Agent instrument class at runtime to detect dirty object.'
        inceptionYear = "2021"
        url = 'https://github.com/mdre/tdd-agent'
        licenses {
            license {
                name = 'The Apache License, Version 2.0'
                url  = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                distribution = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
            }
        }
        developers {
            developer {
                id    = 'mdre'
                name  = 'Marcelo D. RE'
                email = 'marcelo.re@gmail.com'
                url   = 'https://github.com/mdre'
            }
        }
        scm {
            url                 = 'https://github.com/mdre/tdd-agent'
            connection          = 'scm:git:git://github.com/mdre/tdd-agent.git'
            developerConnection = 'scm:git:ssh://github.com/mdre/tdd-agent.git'
        }
    }
}

// ============================================================
// Resolver versiones dinámicas en el POM publicado
//
// FIX #6: afterEvaluate + tasks.withType().configureEach() es
// el patrón correcto en Gradle 9. El bloque interno de
// tasks.matching{}.configureEach estaba anidado dentro del
// configureEach de GenerateMavenPom, lo cual viola la regla
// de Gradle 9 de no mutar el task graph desde dentro de una
// acción de configuración. Se separa en su propio bloque.
// ============================================================
afterEvaluate {
    tasks.withType(GenerateMavenPom).configureEach { pomTask ->
        pomTask.doLast {
            def resolvedVersions = [:]
            configurations.runtimeClasspath.resolvedConfiguration
                    .resolvedArtifacts
                    .each { artifact ->
                        def id = artifact.moduleVersion.id
                        resolvedVersions["${id.group}:${id.name}"] = id.version
                    }

            def pomFile    = pomTask.destination
            def pomContent = pomFile.text

            resolvedVersions.each { coords, resolvedVersion ->
                def parts = coords.split(":")
                def grp   = parts[0]
                def art   = parts[1]
                pomContent = pomContent.replaceAll(
                    "(<groupId>${grp}</groupId>\\s*<artifactId>${art}</artifactId>\\s*<version>)[^<]*(</version>)",
                    "\$1${resolvedVersion}\$2"
                )
            }
            pomFile.text = pomContent
        }
    }

    // Separado del bloque anterior — Gradle 9 no permite mutar
    // otros tasks desde dentro de una acción de configuración
    tasks.matching { it.name == 'generateMetadataFileForMavenPublication' }.configureEach { metadataTask ->
        if (tasks.findByName('plainJavadocJar')) {
            metadataTask.dependsOn('plainJavadocJar')
        }
    }
}

// ============================================================
// Fat JAR
// ============================================================
tasks.register('fatJar', Jar) {
    dependsOn 'classes'
    archiveClassifier    = 'all'
    duplicatesStrategy   = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    with tasks.named('jar').get()
}